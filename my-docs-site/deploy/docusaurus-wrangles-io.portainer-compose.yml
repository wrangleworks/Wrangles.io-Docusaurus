version: "3.8"

services:
  docusaurus-wrangles-io:
    image: ghcr.io/wrangleworks/docusaurus:latest
    container_name: docusaurus-wrangles-io
    restart: unless-stopped
    ports:
      - "3007:3000"
    environment:
      WRANGLES_USER: ${WRANGLES_USER}
      WRANGLES_PASSWORD: ${WRANGLES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 1
      start_period: 20s
    networks:
      - docusaurus-proxy

networks:
  docusaurus-proxy:
    external: true
