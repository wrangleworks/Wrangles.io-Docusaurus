version: "3.8"

services:
  docusaurus-wrangles-io:
    image: ghcr.io/wrangleworks/docusaurus:latest
    container_name: docusaurus-wrangles-io
    restart: unless-stopped
    ports:
      - "3007:3000"
    environment:
      WRANGLES_USER: ${WRANGLES_USER}
      WRANGLES_PASSWORD: ${WRANGLES_PASSWORD}
      VENV_DIR: /opt/venv
    volumes:
      - docusaurus-python-venv:/opt/venv
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:3000/healthz').status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - docusaurus-proxy

networks:
  docusaurus-proxy:
    external: true

volumes:
  docusaurus-python-venv:
